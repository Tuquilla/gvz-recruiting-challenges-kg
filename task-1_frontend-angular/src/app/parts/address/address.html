<app-card appearance="outlined">
  <div class="addresses">
    <div class="address half">
      <p class="label">Name</p>
      <app-text-input
        label="Name"
        [control]="nameFormControl"
      >
      </app-text-input>
    </div>
    <div class="address half">
      <p class="label">Vorname</p>
      <app-text-input
        label="Vorname"
        [control]="prenameFormControl"
      >
      </app-text-input>
    </div>
    <div class="address full">
      <p class="label">Firmenzusatz</p>
      <app-text-input
        label="Firmenzusatz (optional)"
        [control]="companyFormControl"
        [maxLength]="100"
        [multiline]="true"
      >
      </app-text-input>
    </div>
    <div class="address half">
      <p class="label">Strasse</p>
      <app-text-input
        label="Strasse"
        [control]="streetFormControl"
      >
      </app-text-input>
    </div>
    <div class="address one-fourth">
      <p class="label">Hausnummer</p>
      <app-text-input
        label="Hausnummer"
        [control]="housenumberFormControl"
      >
      </app-text-input>
    </div>
    <div class="address full">
      <p class="label">Adresszusatz</p>
      <app-text-input
        label="Addresszusatz (optional)"
        [control]="addressAdditionFormControl"
        [maxLength]="100"
        [multiline]="true"
      >
      </app-text-input>
    </div>
    <div class="address one-fourth">
      <p class="label">Postleitzahl</p>
      <app-number-input
        [control]="postcodeFormControl"
        label="Postleitzahl"
      >
      </app-number-input>
    </div>
    <div class="address half">
      <p class="label">Ort</p>
      <app-text-input
        label="Ort"
        [control]="localityFormControl"
      >
      </app-text-input>
    </div>
  </div>
</app-card>
