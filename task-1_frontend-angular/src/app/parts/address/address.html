<app-card appearance="outlined">
  <div class="addresses">
    <div class="address half">
      <p class="label">Name</p>
      <app-text-input
        label="Name"
        [control]="addressFormGroup.controls.name"
        [maxLength]="standardMaxLength"
      >
      </app-text-input>
    </div>
    <div class="address half">
      <p class="label">Vorname</p>
      <app-text-input
        label="Vorname"
        [control]="addressFormGroup.controls.prename"
        [maxLength]="standardMaxLength"
      >
      </app-text-input>
    </div>
    <div class="address full">
      <p class="label">Firmenzusatz</p>
      <app-text-input
        label="Firmenzusatz (optional)"
        [control]="addressFormGroup.controls.company"
        [maxLength]="multiLineMaxLength"
        [multiline]="true"
      >
      </app-text-input>
    </div>
    <div class="address three-fourth">
      <p class="label">Strasse</p>
      <app-text-input
        label="Strasse"
        [control]="addressFormGroup.controls.street"
        [maxLength]="standardMaxLength"
      >
      </app-text-input>
    </div>
    <div class="address one-fourth">
      <p class="label">Hausnummer</p>
      <app-text-input
        label="Hausnummer (optional)"
        [control]="addressFormGroup.controls.houseNumber"
        [maxLength]="houseNumberMaxLength"
      >
      </app-text-input>
    </div>
    <div class="address full">
      <p class="label">Adresszusatz</p>
      <app-text-input
        label="Addresszusatz (optional)"
        [control]="addressFormGroup.controls.addressAddition"
        [maxLength]="multiLineMaxLength"
        [multiline]="true"
      >
      </app-text-input>
    </div>
    <div class="address one-fourth">
      <p class="label">Postleitzahl</p>
      <app-number-input
        label="Postleitzahl"
        [control]="addressFormGroup.controls.postcode"
        [min]="postcodeMin"
        [max]="postcodeMax"
      >
      </app-number-input>
    </div>
    <div class="address three-fourth">
      <p class="label">Ort</p>
      <app-text-input
        label="Ort"
        [control]="addressFormGroup.controls.locality"
        [maxLength]="standardMaxLength"
      >
      </app-text-input>
    </div>
  </div>
</app-card>
